  Here is the current Manor Lords game state:

  ```json
  {game_state_json}
  ```

  {session_context}

  {guide_context}

  Analyse this state and provide your strategic recommendations.
  IMPORTANT: Base your advice on mechanics valid for version {game_version}. If patch notes mention changes relevant to this version, incorporate them. Do not assume mechanics from older versions still apply.
