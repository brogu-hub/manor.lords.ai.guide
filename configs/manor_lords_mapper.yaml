# Manor Lords GVAS Property Path Mappings
#
# These paths map GVAS property tree locations to GameState fields.
# IMPORTANT: These are PLACEHOLDER paths. They must be discovered by:
#   1. Loading Manor Lords, noting exact values on screen
#   2. Saving the game
#   3. Running: python tools/dump_save.py /saves/your_save.sav --output dump.json
#   4. Running: python tools/discover_paths.py dump.json <value>
#   5. Updating these paths with the actual discovered paths
#
# Format: game_state_field: GVAS.property.path
# Use [N] for array indices, e.g. Settlement.Buildings[0].Type
# Use * for wildcard array iteration, e.g. Settlement.Buildings[*].Type

# -- Meta --
meta:
  year: "SaveGameData.GameTime.CurrentYear"
  season: "SaveGameData.GameTime.CurrentSeason"
  day: "SaveGameData.GameTime.CurrentDay"
  game_speed: "SaveGameData.GameSpeed"

# -- Settlement --
settlement:
  name: "SaveGameData.Settlement.Name"
  approval: "SaveGameData.Settlement.ApprovalRating.CurrentValue"
  population_families: "SaveGameData.Settlement.Population.FamilyCount"
  population_workers: "SaveGameData.Settlement.Population.WorkerCount"
  population_homeless: "SaveGameData.Settlement.Population.HomelessCount"
  regional_wealth: "SaveGameData.Settlement.RegionalWealth"
  lord_personal_wealth: "SaveGameData.Settlement.LordWealth"

# -- Resources --
resources:
  food_total: "SaveGameData.Settlement.Storage.FoodItems.TotalCount"
  food_bread: "SaveGameData.Settlement.Storage.FoodItems.Bread"
  food_berries: "SaveGameData.Settlement.Storage.FoodItems.Berries"
  food_meat: "SaveGameData.Settlement.Storage.FoodItems.Meat"
  food_vegetables: "SaveGameData.Settlement.Storage.FoodItems.Vegetables"
  food_eggs: "SaveGameData.Settlement.Storage.FoodItems.Eggs"
  food_fish: "SaveGameData.Settlement.Storage.FoodItems.Fish"
  firewood: "SaveGameData.Settlement.Storage.Firewood"
  charcoal: "SaveGameData.Settlement.Storage.Charcoal"
  timber: "SaveGameData.Settlement.Storage.Timber"
  planks: "SaveGameData.Settlement.Storage.Planks"
  stone: "SaveGameData.Settlement.Storage.Stone"
  clay: "SaveGameData.Settlement.Storage.Clay"
  leather: "SaveGameData.Settlement.Storage.Leather"
  linen: "SaveGameData.Settlement.Storage.Linen"
  iron: "SaveGameData.Settlement.Storage.IronSlabs"
  ale: "SaveGameData.Settlement.Storage.Ale"
  malt: "SaveGameData.Settlement.Storage.Malt"
  flour: "SaveGameData.Settlement.Storage.Flour"
  yarn: "SaveGameData.Settlement.Storage.Yarn"

# -- Military --
military:
  retinue_count: "SaveGameData.Military.Retinue.Count"
  levies_mobilised: "SaveGameData.Military.LeviesMobilised"
  bandit_camps_nearby: "SaveGameData.Military.BanditCampsNearby"

# -- Development --
development_points: "SaveGameData.Settlement.DevelopmentPoints"

# Season enum mapping (update after discovery)
season_map:
  0: "Spring"
  1: "Summer"
  2: "Autumn"
  3: "Winter"
