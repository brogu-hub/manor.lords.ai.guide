services:
  python-api:
    build: .
    ports:
      - "${DASHBOARD_PORT:-7861}:7861"
    env_file:
      - path: .env
        required: false
    environment:
      - WATCH_PATH=/saves
      - ENABLE_GAME_DETECTION=false
    volumes:
      - "${SAVE_FOLDER:-.}:/saves:ro"
      - api-data:/app/data
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "${WEB_PORT:-7860}:7860"
    environment:
      - API_BASE_URL=http://python-api:7861
      - PORT=7860
    depends_on:
      - python-api
    restart: unless-stopped

volumes:
  api-data:
